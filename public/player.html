<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gamesco Escape Quiz</title><link rel="stylesheet" href="style.css"></head><body>
<header><div><h1>🎮 Gamesco Escape Quiz</h1><div class="small" id="subline">Lobby</div></div><div class="timer" id="timer">30:00</div></header>
<main class="wrap" id="app">
<section class="card joinCard" id="join"><h2>Spieler beitreten</h2><p class="small">Wähle deinen Namen und Avatar. Nach dem Beitritt wartest du in der Lobby, bis der Admin das Spiel startet.</p><input id="name" placeholder="Dein Name"><div class="avatarSelect" id="avatarSelect"></div><button class="good" onclick="join()">Beitreten</button></section>
<section class="card lobbyCard" id="lobby" style="display:none"><h2>Lobby</h2><div id="message" class="status"></div><h3>Mitspieler</h3><div id="playersLobby"></div><p class="small">Das Spiel startet erst, wenn der Admin auf „Spiel starten“ drückt.</p></section>
<section class="card gameHead" id="gameHead" style="display:none"><h2 id="roundTitle">Runde</h2><div id="messageGame" class="status"></div><div id="rules"></div></section>
<div class="grid gameGrid" id="gameGrid" style="display:none"><section class="card teamPanel"><h2>Team</h2><div id="players"></div></section><section class="card mainTask"><h2>Aufgabe</h2><div id="task"></div></section><section class="card notePanel"><h2>Notizblock</h2><textarea id="note" placeholder="Hinweise mitschreiben..." oninput="emit('player:note',this.value)"></textarea></section></div>
<section class="card codesPanel" id="codesPanel" style="display:none"><h2>Code-Terminal</h2><div id="codes"></div></section>
</main>
<audio id="music" loop></audio>
<script src="/socket.io/socket.io.js"></script><script>
const socket=io(),$=id=>document.getElementById(id);let S={},joined=false,myAvatar='🧩';
let lastPlayersKey='',lastVisibilityKey='',lastTaskKey='',lastCodesKey='',lastRulesKey='';
const AVATARS=['🧩','🕵️','🧙','🥷','🤖','👻','🐱','🦊','🐲','👑','🛡️','⚡'];
function buildAvatars(){ $('avatarSelect').innerHTML=AVATARS.map((a,i)=>`<button type="button" class="avatarPick ${i===0?'active':''}" onclick="pickAvatar('${a}',this)">${a}</button>`).join(''); }
function pickAvatar(a,btn){myAvatar=a;document.querySelectorAll('.avatarPick').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
buildAvatars();
function emit(e,d){socket.emit(e,d)}
function fmt(s){s=Math.max(0,s||0);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function join(){joined=true;$('join').style.display='none';$('lobby').style.display='block';emit('player:join',{name:$('name').value||'Spieler',avatar:myAvatar});startMusic()}
let lastSfxAt={};
function play(key){
  let src=S.data?.audioConfig?.sfx?.[key]; if(!src)return;
  if(key==='bombTick'){
    const now=Date.now();
    if(now-(lastSfxAt.bombTick||0)<1200) return;
    lastSfxAt.bombTick=now;
  }
  let a=new Audio(src);
  a.volume=S.audio?.sfxVolume??.8;
  a.play().catch(()=>{});
}
socket.on('playSound',play); socket.on('winner',p=>{showWinner(p)});
function startMusic(){if(!joined)return;let cfg=S.data?.audioConfig, r=cfg?.backgroundByRound?.[String(S.round)]||{}, m=$('music'); if(!cfg||S.audio?.musicEnabled===false||r.enabled===false||!r.src||!S.gameStarted){m.pause();return} if(!m.src.endsWith(r.src)){m.src=r.src} m.volume=(S.audio?.musicVolume??cfg.global?.musicVolume??.35)*(r.volume??1); m.play().catch(()=>{});} document.body.addEventListener('click',startMusic,{once:false});
socket.on('state',s=>{
  S=s;
  $('timer').textContent=fmt(s.escape?.timer??1800);
  $('subline').textContent=s.gameStarted?(s.round==7?'Finale':'Runde '+s.round):'Lobby';
  $('message').innerHTML=s.message||'';
  $('messageGame').innerHTML=s.message||'';
  document.body.classList.toggle('playerFinale',s.round==7);
  updateBombTimerOnly();
  const visibilityKey=JSON.stringify([joined,!!s.gameStarted,s.round,s.finale?.started,s.finale?.warningActive]);
  if(visibilityKey!==lastVisibilityKey){lastVisibilityKey=visibilityKey;renderVisibility();}
  const playersKey=JSON.stringify([(s.players||[]).map(p=>[p.id,p.name,p.avatar]),s.teamChefId,s.finale?.acknowledgements]);
  if(playersKey!==lastPlayersKey){lastPlayersKey=playersKey;renderPlayers();}
  const rulesKey=JSON.stringify([s.showRules,s.round]);
  if(rulesKey!==lastRulesKey){lastRulesKey=rulesKey;renderRules();}
  const taskKey=JSON.stringify([s.gameStarted,s.round,s.itemIndex,s.safe,s.data?.symbolFakePages,s.bomb?.phase,s.bomb?.errors,s.bomb?.status,s.bomb?.wireProgress,s.memory?.flipped,s.finale]);
  if(taskKey!==lastTaskKey){lastTaskKey=taskKey;renderTask();}
  const codesKey=JSON.stringify([s.gameStarted,s.round,s.locks,s.codeEntries]);
  if(codesKey!==lastCodesKey){lastCodesKey=codesKey;renderCodes();}
  startMusic();
});
function updateBombTimerOnly(){let el=$('bombTimerDisplay'); if(el) el.textContent=fmt(S.bomb?.timer||0); let admin=0;}
function renderVisibility(){let game=!!S.gameStarted;if(!joined){$('join').style.display='block';$('lobby').style.display='none';$('gameHead').style.display='none';$('gameGrid').style.display='none';$('codesPanel').style.display='none';return} $('lobby').style.display=game?'none':'block';$('gameHead').style.display=game?'block':'none';$('gameGrid').style.display=game?'grid':'none';$('codesPanel').style.display=(game&&S.round!==7)?'block':'none';}
function renderPlayers(){let ps=S.players||[];let html=ps.map(p=>`<div class="player ${p.id===S.teamChefId?'teamchef':''}"><span class="avatar">${p.avatar}</span> <b>${p.name}</b> ${p.id===S.teamChefId?'👑 Teamchef':''}</div>`).join('')||'<p class="small">Noch keine Spieler.</p>';$('players').innerHTML=html;$('playersLobby').innerHTML=html;}
function renderRules(){const rules={1:'Runde 1: Findet den Wand-Code. Jeder Spieler gibt ihn selbst ein.',2:'Runde 2: Symbol-Tresor. Klickt die richtige Symbolfolge.',3:'Runde 3: Hört genau hin.',4:'Runde 4: Findet die lügende Aussage.',5:'Runde 5: Nur der Teamchef gibt Lösungswort und Zahlencode ein.',6:'Runde 6: Teamchef schneidet Kabel. Die anderen lesen Fake-Seiten und helfen über Discord.',7:'Finale: Jeder gegen jeden. Memory-Karten merken und Exit-Code eingeben.'};$('rules').innerHTML=S.showRules?`<div class="card rules">${rules[S.round]}</div>`:''; $('roundTitle').textContent=S.round==7?'Finale':'Runde '+S.round;}

function lieStatementRow(x,i){
  if(x && typeof x==='object') return `<div class="lieCodeRow"><b>${x.code||String(i+1).padStart(4,'0')}</b><span>${x.text||x.statement||''}</span></div>`;
  let txt=String(x||''), m=txt.match(/^\s*(\d{4})\s*[:\-–]\s*(.*)$/);
  return `<div class="lieCodeRow"><b>${m?m[1]:String(i+1).padStart(4,'0')}</b><span>${m?m[2]:txt}</span></div>`;
}
function symbolFakePagesHtml(){
  const pages=S.data?.symbolFakePages||[];
  if(!pages.length) return '';
  return `<h3>Fake-Seiten / Hinweise</h3><p class="small">Diese Seiten gehören nur zu Runde 2 und sind unabhängig von Runde 1.</p>${pages.map(p=>`<details class="card fakePage"><summary>${p.buttonText||'Seite öffnen'}</summary><h3>${p.title||''}</h3><p>${p.content||''}</p></details>`).join('')}`;
}

function item(){if(S.round==1)return (S.data.questions||[])[S.itemIndex]||{}; if(S.round==2)return S.data.symbolSafe||{}; if(S.round==3)return (S.data.sounds||[])[S.itemIndex]||{}; if(S.round==4)return (S.data.lies||[])[S.itemIndex]||{}; if(S.round==5)return (S.data.anagram||[])[0]||{}; if(S.round==7)return S.data.finalMemory||{}; return {};}
function renderTask(){if(!S.gameStarted){$('task').innerHTML='';return} if(S.round==7 && !S.finale?.started){$('task').innerHTML=renderFinaleWarning();return}let it=item(),html=''; if(S.round==1)html=`<h3>${it.title||''}</h3><p>${it.story||''}</p><div class="wallRiddle">${(it.clues||[]).map(x=>'▸ '+x).join('<br>')}</div>`; if(S.round==2){let sy=it.symbols||[];html=`<p>${it.story||''}</p><div class="safeGrid">${sy.map(x=>`<button class="safeSymbol" onclick="emit('player:symbol','${x.id}')"><span>${x.icon}</span><small>${x.label}</small></button>`).join('')}</div>${symbolFakePagesHtml()}`} if(S.round==3)html=`<h3>${it.title||''}</h3><p>${it.question||''}</p>${it.audioUrl?`<audio controls src="${it.audioUrl}"></audio>`:''}`; if(S.round==4)html=`<h3>${it.title||''}</h3><p>${it.story||''}</p><p class="small">${it.instruction||'Findet die gelogene Aussage und gebt den 4-stelligen Code im Code-Terminal ein.'}</p><div class="lieCodeList">${(it.statements||[]).map((x,i)=>lieStatementRow(x,i)).join('')}</div>`; if(S.round==5)html=`<h3>${it.title||''}</h3><p>${it.story||''}</p><div class="letterRiddle">${(it.letters||[]).join(' - ')}</div><p>${it.visibleHint||''}</p><input id="word" placeholder="Lösungswort"><input id="num" placeholder="Zahlencode"><button class="good" onclick="emit('player:anagram',{word:$('word').value,number:$('num').value})">Absenden</button>`; if(S.round==6)html=renderBomb(); if(S.round==7)html=renderMemory(it); $('task').innerHTML=html;}
function renderBomb(){
  if(!S.teamChefId){
    return `<div class="bombLocked"><h2>🔒 Bombenraum gesperrt</h2><p>Wartet, bis der Admin einen Teamchef bestimmt hat.</p><p class="small">Erst danach sieht der Teamchef die Bombe. Alle anderen Spieler bekommen nur die Fake-Seiten mit Hinweisen.</p></div>`;
  }
  const meIsChef = S.teamChefId === socket.id;
  let w=S.data.wireBomb||{}, wires=w.wires||[];
  if(meIsChef){
    return `<div class="roleNotice teamchefNotice">👑 Du bist Teamchef. Du siehst die Bombe und musst die Kabel in der richtigen Reihenfolge durchtrennen.</div><div class="bombDevice"><div class="bombShell"><div class="bombTop"><span></span><span></span></div><div class="bombScreen"><b id="bombTimerDisplay">${fmt(S.bomb?.timer||0)}</b><small>BOMBENZEIT · PHASE ${S.bomb?.phase||1} · FEHLER ${S.bomb?.errors||0}</small></div><div class="wireBoard">${wires.map(x=>`<button class="realWire" style="--wire:${x.color}" onclick="emit('player:wire','${x.id}')"><span></span><b>${x.label}</b><em>durchtrennen</em></button>`).join('')}</div></div></div>`;
  }
  return `<div class="roleNotice helperNotice">📄 Du bist Helfer. Du siehst keine Bombe, sondern nur die Fake-Seiten mit Hinweisen. Erkläre dem Teamchef über Discord, was er tun soll.</div><h3>Fake-Seiten mit Hinweisen</h3>${(S.data.fakePages||[]).map(p=>`<details class="card fakePage"><summary>${p.buttonText}</summary><h3>${p.title}</h3><p>${p.content}</p></details>`).join('')}`;
}

function renderFinaleWarning(){
  const ack=S.finale?.acknowledgements||{};
  const ps=S.players||[];
  const list=ps.map(p=>`<div class="player ${ack[p.id]?'teamchef':''}"><span class="avatar">${p.avatar}</span> <b>${p.name}</b><span>${ack[p.id]?'✅ bestätigt':'⏳ wartet'}</span></div>`).join('')||'<p class="small">Noch keine Spieler.</p>';
  const meDone=!!ack[socket.id];
  return `<div class="systemErrorBox"><h2>🚨 SYSTEMFEHLER</h2><h3>TEAM-MODUS BEENDET</h3><p>Ab jetzt spielt jeder gegen jeden. Keine Teamabsprachen mehr. Bestätige die Warnung, damit das Finale starten kann.</p><button class="danger bigConfirm" ${meDone?'disabled':''} onclick="emit('player:finaleAck')">${meDone?'Bestätigt – warte auf alle anderen':'Warnung bestätigen'}</button><h3>Bestätigungen</h3>${list}</div>`;
}

function cardText(it,n){let r=(it.ruleCards||[]).find(x=>+x.number===n); if(r)return r.content; let c=(it.codeCards||[]).find(x=>+x.number===n); if(c)return 'Zahl: '+c.value; return it.emptyCardText||'Kein Hinweis'}
function renderMemory(it){let max=+it.cardCount||40, open=S.memory?.flipped?.[0];return `<div class="finaleMiniWarn redWarn">🚨 SYSTEMFEHLER BESTÄTIGT: Team-Modus beendet!</div><p>${it.instruction||''}</p><div class="memoryGrid">${Array.from({length:max},(_,i)=>{let n=i+1,o=open===n;return `<button class="memoryCard ${o?'open':''}" onclick="emit('player:memoryFlip',${n})"><b>${n}</b><span>${o?cardText(it,n):'?'}</span></button>`}).join('')}</div><div class="finalExitBox"><h3>🚪 Exit-Code eingeben</h3><p class="small">Wer den finalen Code findet, kann entkommen.</p><input id="finalCode" placeholder="Finaler Exit-Code"><button class="good" onclick="emit('player:finalEscape',$('finalCode').value)">Tür öffnen</button></div>`}
function showWinner(p){let box=document.createElement('div');box.className='winnerOverlay';box.innerHTML=`<div class="doorAnim"><div class="door left"></div><div class="door right"></div><div class="winnerText">👑 ${p?.name||'Gewinner'} ist entkommen!</div></div>`;document.body.appendChild(box);setTimeout(()=>box.remove(),7000)}
function renderCodes(){let codes=(S.data.codes||[]).filter(c=>!c.round||c.round===S.round);$('codes').innerHTML=codes.map(c=>`<div class="lock ${S.locks?.[c.id]?'open':''}"><b>${S.locks?.[c.id]?'✅':'🔒'} ${c.title}</b><p class="small">${c.hint||''}</p><input id="code_${c.id}" placeholder="Code"><button onclick="emit('player:code',{id:'${c.id}',code:$('code_${c.id}').value})">Code prüfen</button></div>`).join('')}
</script></body></html>
